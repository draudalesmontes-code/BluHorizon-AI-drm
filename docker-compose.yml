services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/faiss_data:/app/faiss_data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped